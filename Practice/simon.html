<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon says</title>
    <link rel="stylesheet" href="simon.css">
</head>

<body>
    <div class="container">
        <div class="top">
            <h1 class="head1">Simon Says</h1>
            <h2 class="level">Level 0</h2>
            <h3 class="display">Press any key to start !!</h3>
        </div>
        <div class="bottom">
            <div class="center">
                <div class="box1 boxes red" id="red">RED</div>
                <div class="box2 boxes blue" id="blue" >BLUE</div>
                <div class="box3 boxes green" id="green">GREEN</div>
                <div class="box4 boxes yellow" id="yellow">YELLOW</div>
            </div>
        </div>
    </div>



    <script src="simon.js"></script>
</body>

</html>
