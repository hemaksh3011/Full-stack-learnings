<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
</head>
<body>
    <h3>GET request</h3>
    <form action="http://localhost:3300/register" method="get">
        <input type="text" placeholder="username" name="username">
        <input type="password" placeholder="password" name="password">
        <button type="submit">submit</button>
    </form>
    <h3>POST request</h3>
    <form action="http://localhost:3300/register" method="Post">
        <input type="text" placeholder="username" name="username">
        <input type="password" placeholder="password" name="password">
        <button type="submit">submit</button>
    </form>
</body>
</html>
