<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TO Do</title>
    <link rel="stylesheet" href="todo.css">
</head>
<body>
    <div class="container">
        <div class="left">
            <h2 class="heading">Todo</h2>
            <input type="text" class="task" placeholder="Task..">
            <button class="add">Add task</button>
            <ul class="todo">
            </ul>
        </div>
        <div class="right">
            <h2 class="heading">Completed <button class="delete">Clear all</button> </h2>
            <ul class="completed-tasks">

            </ul>
        </div>
        
      
    </div>


    <script src="todo.js"></script>
</body>
</html>
